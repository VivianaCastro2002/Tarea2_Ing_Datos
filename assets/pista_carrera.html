<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Rainbow Road Top-Down</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { 
      background: #050510; 
      display: flex; 
      flex-direction: column; 
      align-items: center; 
      justify-content: center; 
      min-height: 100vh; 
      font-family: monospace; 
      color: #aaa; 
      gap: 10px; 
    }
    canvas { display: block; }
    #info { font-size: 12px; letter-spacing: 0.08em; opacity: 0.6; }
  </style>
</head>
<body>
<div id="info">RAINBOW ROAD · 3 CARRILES · 800 × 600 px</div>

<script>
// ─── Geometría ────────────────────────────────────────────────
const LANE_W = 120;                  
const TRACK_W = LANE_W * 3;          
const TRACK_X = (800 - TRACK_W) / 2; 

// ─── Colores ──────────────────────────────────────────────────
const LINE_YELLOW  = [255, 210, 0  ];
const LINE_WHITE   = [255, 255, 255];
const KERB_RED     = [210, 20,  20 ];
const KERB_WHITE   = [245, 245, 245];

// 6 colores del arcoíris (2 por cada uno de los 3 carriles)
const RAINBOW_COLORS = [
  [255, 50,  50 ], // Rojo
  [255, 150, 0  ], // Naranja
  [255, 255, 50 ], // Amarillo
  [50,  255, 50 ], // Verde
  [50,  150, 255], // Azul
  [150, 50,  255]  // Violeta
];

function setup() {
  createCanvas(800, 600);
  noLoop(); 
}

function draw() {
  drawStars();
  drawRainbowTrack();
  drawKerbs();
  drawBorders();
  drawLaneDividers();
  drawStartLine();
  drawArrows();
}

// ─── 1. CIELO ESTRELLADO ──────────────────────────────────────
function drawStars() {
  background(5, 5, 20); // Azul espacial muy oscuro
  randomSeed(42);
  noStroke();
  
  // Generar 200 estrellas aleatorias
  for (let i = 0; i < 200; i++) {
    fill(255, 255, random(200, 255), random(100, 255));
    let x = random(width);
    let y = random(height);
    let s = random(1, 4);
    ellipse(x, y, s, s);
  }
}

// ─── 2. PISTA ARCOÍRIS ────────────────────────────────────────
function drawRainbowTrack() {
  noStroke();
  let subLaneW = LANE_W / 2; // La mitad de un carril para tener 6 franjas

  for (let i = 0; i < 6; i++) {
    fill(...RAINBOW_COLORS[i]);
    rect(TRACK_X + i * subLaneW, 0, subLaneW, height);
  }

  // Capa blanca semitransparente para dar un efecto pastel/neón y mejorar contraste
  fill(255, 255, 255, 30);
  rect(TRACK_X, 0, TRACK_W, height);
}

// ─── 3. KERBS / BORDILLOS ─────────────────────────────────────
function drawKerbs() {
  let kerbH = 30; 
  let kerbW = 12; 
  noStroke();
  
  for (let y = 0; y < height; y += kerbH) {
    fill((y / kerbH) % 2 === 0 ? color(...KERB_RED) : color(...KERB_WHITE));
    rect(TRACK_X - kerbW, y, kerbW, kerbH);           
    rect(TRACK_X + TRACK_W, y, kerbW, kerbH);         
  }
}

// ─── 4. BORDES BLANCOS ────────────────────────────────────────
function drawBorders() {
  stroke(...LINE_WHITE);
  strokeWeight(3);
  line(TRACK_X, 0, TRACK_X, height);
  line(TRACK_X + TRACK_W, 0, TRACK_X + TRACK_W, height);
}

// ─── 5. LÍNEAS DE CARRIL ──────────────────────────────────────
function drawLaneDividers() {
  drawingContext.setLineDash([22, 13]); 
  stroke(...LINE_WHITE); // Cambiado a blanco para destacar mejor sobre el arcoíris
  strokeWeight(2);
  
  line(TRACK_X + LANE_W, 0, TRACK_X + LANE_W, height);
  line(TRACK_X + 2 * LANE_W, 0, TRACK_X + 2 * LANE_W, height);
  
  drawingContext.setLineDash([]); 
}

// ─── 6. LÍNEA DE SALIDA / META ────────────────────────────────
function drawStartLine() {
  let slY = 450;
  let tile = 15;
  let cols = TRACK_W / tile;
  let rows = 4;

  noStroke();
  for (let r = 0; r < rows; r++) {
    for (let c = 0; c < cols; c++) {
      fill((r + c) % 2 === 0 ? 255 : 0);
      rect(TRACK_X + c * tile, slY + r * tile, tile, tile);
    }
  }

  fill(...LINE_YELLOW);
  textAlign(CENTER, CENTER);
  textSize(16);
  textStyle(BOLD);
  text("START", width / 2, slY - 15);
  textStyle(NORMAL);
}

// ─── 7. FLECHAS DE DIRECCIÓN ──────────────────────────────────
function drawArrows() {
  arrow(TRACK_X + LANE_W * 0.5, 300, -HALF_PI);
  arrow(TRACK_X + LANE_W * 1.5, 300, -HALF_PI);
  arrow(TRACK_X + LANE_W * 2.5, 300, -HALF_PI);
}

function arrow(x, y, angle) {
  push();
  translate(x, y);
  rotate(angle);
  fill(255, 255, 255, 180);
  noStroke();
  let s = 20;
  beginShape();
  vertex( s,      0      );  
  vertex(-s * 0.5, -s * 0.55); 
  vertex(-s * 0.18, 0    );  
  vertex(-s * 0.5,  s * 0.55); 
  endShape(CLOSE);
  pop();
}
</script>
</body>
</html>
